name: Build and Push Multi-Service to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Set both repo URIs
      - name: Set ECR URIs
        run: |
          echo "API_ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/api" >> $GITHUB_ENV
          echo "WEB_ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/web" >> $GITHUB_ENV

      # =========================
      # Build API Image
      # =========================
      - name: Build API image
        run: |
          docker build -t api:${{ github.sha }} ./api

      - name: Tag API image
        run: |
          docker tag api:${{ github.sha }} $API_ECR_URI:${{ github.sha }}

      - name: Push API image
        run: |
          docker push $API_ECR_URI:${{ github.sha }}

      # =========================
      # Build WEB Image
      # =========================
      - name: Build WEB image
        run: |
          docker build -t web:${{ github.sha }} ./web

      - name: Tag WEB image
        run: |
          docker tag web:${{ github.sha }} $WEB_ECR_URI:${{ github.sha }}

      - name: Push WEB image
        run: |
          docker push $WEB_ECR_URI:${{ github.sha }}